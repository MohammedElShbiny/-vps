name: Windows RDP (Pinggy Fixed)
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Enable RDP and Configure User
      run: |
        # Enable RDP in Registry
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        # Allow RDP through Firewall
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        # Set the password for the runneradmin account
        net user runneradmin MySecretPassword123!
        # Prevent the runner from sleeping
        powercfg /x -hibernate-timeout-ac 0
        powercfg /x -hibernate-timeout-dc 0

    - name: Start Pinggy Tunnel
      run: |
        # -t -t forces a terminal, which helps Pinggy display the URL in GitHub logs
        ssh -p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -t -t -R0:localhost:3389 tcp@a.pinggy.io
