name: Windows RDP (Pinggy Log-Fix)
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
    - name: Enable RDP and Configure User
      run: |
        Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
        Enable-NetFirewallRule -DisplayGroup "Remote Desktop"
        net user runneradmin MySecretPassword123!
        
    - name: Start Tunnel and Export URL
      shell: cmd
      run: |
        :: Start SSH in the background and save output to a file
        start /b ssh -p 443 -o StrictHostKeyChecking=no -o ServerAliveInterval=30 -t -t -R0:localhost:3389 tcp@a.pinggy.io > pinggy.log 2>&1
        
        :: Wait 15 seconds for the tunnel to initialize
        timeout /t 15 /nobreak > nul
        
        :: Display the log file to see the URL
        type pinggy.log
        
        :: Keep the action alive so the tunnel doesn't close
        echo "Tunnel is running... Keep this tab open."
        timeout /t 21600 /nobreak
